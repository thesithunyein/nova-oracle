<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NovaPay Logo Downloader</title>
<style>
  body{background:#0c0a1a;color:#fff;font-family:system-ui;margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px}
  h1{margin:0;font-size:28px}
  p{margin:0;color:#a1a1aa}
  .preview{background:#1a1428;padding:32px;border-radius:16px;border:1px solid #2d2440}
  button{padding:14px 28px;border-radius:10px;border:0;font-size:16px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#a855f7,#7c3aed);color:white;transition:transform .15s}
  button:hover{transform:translateY(-2px)}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .size-label{font-size:12px;color:#a1a1aa;margin-bottom:6px;text-align:center}
</style>
</head>
<body>
<h1>NovaPay Logo Downloader</h1>
<p>Click any size to download a PNG</p>

<div class="preview">
<svg id="src" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="200" height="200">
  <defs>
    <linearGradient id="f" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0c0a1a"/>
  <circle cx="10" cy="8" r="4.5" fill="url(#f)"/>
  <circle cx="22" cy="8" r="4.5" fill="url(#f)"/>
  <ellipse cx="16" cy="16" rx="9.5" ry="9" fill="url(#f)"/>
  <ellipse cx="13" cy="14.5" rx="1.8" ry="2" fill="#0c0a1a"/>
  <ellipse cx="19" cy="14.5" rx="1.8" ry="2" fill="#0c0a1a"/>
  <circle cx="13.5" cy="14" r="0.7" fill="#fff"/>
  <circle cx="19.5" cy="14" r="0.7" fill="#fff"/>
  <ellipse cx="16" cy="17.5" rx="1.3" ry="1" fill="#1a0a2e"/>
  <path d="M15 11 L16 10 L17 11 L17 12.5 L16 13.5 L15 12.5 Z" fill="#fff" opacity="0.8"/>
</svg>
</div>

<div class="row">
  <div><div class="size-label">256×256</div><button onclick="dl(256)">Download 256px</button></div>
  <div><div class="size-label">512×512 (recommended)</div><button onclick="dl(512)">Download 512px</button></div>
  <div><div class="size-label">1024×1024</div><button onclick="dl(1024)">Download 1024px</button></div>
</div>

<script>
function dl(size){
  const svg = document.getElementById('src');
  const xml = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([xml],{type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = ()=>{
    const canvas = document.createElement('canvas');
    canvas.width = size; canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img,0,0,size,size);
    canvas.toBlob(b=>{
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = `novapay-logo-${size}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
      URL.revokeObjectURL(url);
    },'image/png');
  };
  img.src = url;
}
</script>
</body>
</html>
