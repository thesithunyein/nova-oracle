<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0c0a1a"/>
    </linearGradient>
    <linearGradient id="fur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="snout" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Left ear -->
  <circle cx="170" cy="130" r="65" fill="url(#fur)"/>
  <circle cx="170" cy="130" r="38" fill="#c084fc" opacity="0.5"/>
  <!-- Right ear -->
  <circle cx="342" cy="130" r="65" fill="url(#fur)"/>
  <circle cx="342" cy="130" r="38" fill="#c084fc" opacity="0.5"/>
  <!-- Head -->
  <ellipse cx="256" cy="250" rx="140" ry="130" fill="url(#fur)"/>
  <!-- Snout -->
  <ellipse cx="256" cy="290" rx="70" ry="50" fill="url(#snout)" opacity="0.6"/>
  <!-- Left eye -->
  <ellipse cx="210" cy="230" rx="20" ry="22" fill="#0c0a1a"/>
  <ellipse cx="214" cy="225" rx="7" ry="8" fill="#fff"/>
  <!-- Right eye -->
  <ellipse cx="302" cy="230" rx="20" ry="22" fill="#0c0a1a"/>
  <ellipse cx="306" cy="225" rx="7" ry="8" fill="#fff"/>
  <!-- Nose -->
  <ellipse cx="256" cy="275" rx="16" ry="12" fill="#1a0a2e"/>
  <!-- Mouth -->
  <path d="M244 290 Q256 305 268 290" fill="none" stroke="#1a0a2e" stroke-width="3" stroke-linecap="round"/>
  <!-- Shield mark on forehead -->
  <path d="M243 185 L256 175 L269 185 L269 200 L256 210 L243 200 Z" fill="#fff" opacity="0.8"/>
  <!-- NOVA text -->
  <text x="256" y="435" font-family="system-ui,-apple-system,sans-serif" font-size="68" font-weight="800" fill="#c084fc" text-anchor="middle" letter-spacing="-1">NOVA</text>
</svg>
